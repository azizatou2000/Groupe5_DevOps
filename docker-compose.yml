version: '3.8'

services:

  users-service:
    build: ./backend/users-service
    platform: linux/amd64        # Compatibilité Mac ARM (M1/M2/M3)
    ports:
      - "8000:8000"
    # Pas de command: ici — le CMD du Dockerfile gère migrate + runserver

  books-service:
    build: ./backend/books-service
    platform: linux/amd64
    ports:
      - "8001:8001"

  borrowings-service:
    build: ./backend/borrowings-service
    platform: linux/amd64
    ports:
      - "8002:8002"
    environment:
      - BOOKS_SERVICE_URL=http://books-service:8001
    depends_on:
      - books-service

  frontend:
    build: ./frontend
    platform: linux/amd64
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src          # Hot-reload : seul le source est monté
      - ./frontend/public:/app/public
    environment:
      - CHOKIDAR_USEPOLLING=true         # Nécessaire sur Windows (WSL2) et Mac
