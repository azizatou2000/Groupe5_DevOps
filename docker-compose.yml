services:

  # ============================================
  # Base de donnees partagee
  # ============================================
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: librairie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Microservice Utilisateurs
  # ============================================
  users-service:
    build:
      context: ./users-service
    environment:
      DJANGO_SECRET_KEY: users-secret-key-change-in-prod
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,users-service
      POSTGRES_DB: librairie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # Microservice Livres
  # ============================================
  books-service:
    build:
      context: ./books-service
    environment:
      DJANGO_SECRET_KEY: books-secret-key-change-in-prod
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,books-service
      POSTGRES_DB: librairie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      USERS_SERVICE_URL: http://users-service:8001
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
      users-service:
        condition: service_started

  # ============================================
  # Microservice Emprunts
  # ============================================
  borrowings-service:
    build:
      context: ./borrowings-service
    environment:
      DJANGO_SECRET_KEY: borrowings-secret-key-change-in-prod
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,borrowings-service
      POSTGRES_DB: librairie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      USERS_SERVICE_URL: http://users-service:8001
      BOOKS_SERVICE_URL: http://books-service:8002
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
      users-service:
        condition: service_started
      books-service:
        condition: service_started

  # ============================================
  # Frontend Vue.js
  # ============================================
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - users-service
      - books-service
      - borrowings-service

volumes:
  postgres_data: