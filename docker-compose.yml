version: '3.8'

services:

  # ============================================
  # Base de donnees partagee
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: bibliotheque_db
    environment:
      POSTGRES_DB: bibliotheque_dit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Microservice Utilisateurs (port 8001)
  # ============================================
  users-service:
    build:
      context: ./users-service
      dockerfile: Dockerfile
    container_name: users_service
    environment:
      DJANGO_SECRET_KEY: users-secret-key-change-in-prod
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,users-service
      POSTGRES_DB: bibliotheque_dit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # Microservice Livres (port 8002)
  # ============================================
  books-service:
    build:
      context: ./books-service
      dockerfile: Dockerfile
    container_name: books_service
    environment:
      DJANGO_SECRET_KEY: books-secret-key-change-in-prod
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,books-service
      POSTGRES_DB: bibliotheque_dit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      USERS_SERVICE_URL: http://users-service:8001
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
      users-service:
        condition: service_started

  # ============================================
  # Microservice Emprunts (port 8003)
  # ============================================
  borrowings-service:
    build:
      context: ./borrowings-service
      dockerfile: Dockerfile
    container_name: borrowings_service
    environment:
      DJANGO_SECRET_KEY: borrowings-secret-key-change-in-prod
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,borrowings-service
      POSTGRES_DB: bibliotheque_dit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      USERS_SERVICE_URL: http://users-service:8001
      BOOKS_SERVICE_URL: http://books-service:8002
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
      users-service:
        condition: service_started
      books-service:
        condition: service_started

  # ============================================
  # Frontend (a completer par le dev frontend)
  # ============================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: bibliotheque_frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - users-service
  #     - books-service
  #     - borrowings-service

volumes:
  postgres_data:
